<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바이브코딩 연습</title>
  <style>
    :root {
      --card: rgba(15, 23, 42, 0.78);
      --card-border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 26%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.16), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 32px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid rgba(56, 189, 248, 0.28);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.52);
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 16px auto 0;
      max-width: 740px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      overflow: hidden;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(56, 189, 248, 0.44);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    .card:focus-visible {
      outline: 2px solid rgba(56, 189, 248, 0.9);
      outline-offset: 4px;
    }

    .thumbnail {
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #020617;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease, filter 0.35s ease;
    }

    .card:hover .thumbnail img {
      transform: scale(1.04);
      filter: brightness(0.92);
    }

    .content {
      padding: 22px 22px 24px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .badge {
      flex-shrink: 0;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .desc {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .footer {
      margin-top: 36px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .container { padding-top: 48px; }
      .content { padding: 20px; }
      .title { font-size: 21px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="eyebrow">Portfolio</div>
      <h1>바이브코딩 연습</h1>
      <p class="subtitle">
        간단한 게임을 구현하며 사용해봤습니다.<br/>
        카드를 클릭하면 각 결과물 페이지가 새 창에서 열립니다.
      </p>
    </section>

    <section class="grid">
      <article
        class="card"
        tabindex="0"
        role="link"
        aria-label="오목 게임 페이지 열기"
        onclick="window.open('https://ego1065.github.io/omok/', '_blank', 'noopener,noreferrer')"
        onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); window.open('https://ego1065.github.io/omok/', '_blank', 'noopener,noreferrer'); }"
      >
        <div class="thumbnail">
          <img src="https://s.wordpress.com/mshots/v1/https%3A%2F%2Fego1065.github.io%2Fomok%2F?w=1200" alt="오목 게임 썸네일" loading="lazy" />
        </div>
        <div class="content">
          <div class="title-row">
            <h2 class="title">오목 게임</h2>
            <span class="badge">GAME</span>
          </div>
          <p class="desc">브라우저에서 바로 플레이할 수 있는 오목 프로젝트입니다.</p>
        </div>
      </article>

      <article
        class="card"
        tabindex="0"
        role="link"
        aria-label="카드 뒤집기 게임 페이지 열기"
        onclick="window.open('https://ego1065.github.io/card-flip-game/', '_blank', 'noopener,noreferrer')"
        onkeydown="if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); window.open('https://ego1065.github.io/card-flip-game/', '_blank', 'noopener,noreferrer'); }"
      >
        <div class="thumbnail">
          <img src="https://s.wordpress.com/mshots/v1/https%3A%2F%2Fego1065.github.io%2Fcard-flip-game%2F?w=1200" alt="카드 뒤집기 게임 썸네일" loading="lazy" />
        </div>
        <div class="content">
          <div class="title-row">
            <h2 class="title">카드 뒤집기 게임</h2>
            <span class="badge">GAME</span>
          </div>
          <p class="desc">카드 매칭 방식의 플립 게임입니다.</p>
        </div>
      </article>
    </section>

    <p class="footer">© 2026 Vibecoding Practice Portfolio</p>
  </main>
</body>
</html>
